# Version LOCALE pour tester sur ta machine (Windows + Docker Desktop).
# Pas de Caddy, pas de domaine, pas de HTTPS : n8n ecoute sur http://localhost:5678
# Le workflow du resume est 100% sortant (Gmail pull, Claude, Notify Me POST),
# donc il fonctionne entierement en local.
#
# Lancer :   docker compose -f docker-compose.local.yml up -d
# Ouvrir :   http://localhost:5678
# Arreter :  docker compose -f docker-compose.local.yml down   (les donnees restent dans le volume)

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-local
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_EDITOR_BASE_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Paris
      - TZ=Europe/Paris
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      # Cookie non securise tolere en local (http)
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data_local:/home/node/.n8n

volumes:
  n8n_data_local:
